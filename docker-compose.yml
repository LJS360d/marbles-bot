services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-marbles}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-marbles_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-marbles} -d ${DB_NAME:-marbles_prod}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      MIX_ENV: prod
      # The app connects to the DB service by hostname
      DATABASE_URL: ecto://${DB_USER}:${DB_PASSWORD}@postgres/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - asset_uploads:/app/uploads # Shared asset folder
    command: >
      sh -c "/app/bin/marbles_umbrella eval 'Marbles.Release.migrate()' &&
             exec /app/bin/marbles_umbrella start"

  media_server:
    image: nginx:alpine
    restart: always
    ports:
      - "4001:80"
    volumes:
      - asset_uploads:/usr/share/nginx/html/uploads:ro
    # Simple Nginx config to serve the volume
    entrypoint: /bin/sh -c "echo 'server { listen 80; location /uploads/ { root /usr/share/nginx/html; autoindex off; } }' > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"

volumes:
  postgres_data:
  asset_uploads:
