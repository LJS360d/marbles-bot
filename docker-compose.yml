services:
  database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-marbles}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-marbles_prod}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-marbles} -d ${DB_NAME:-marbles_prod}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      MIX_ENV: prod
      # The app connects to the DB service by hostname
      DATABASE_URL: ecto://${DB_USER}:${DB_PASSWORD}@postgres/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - asset_uploads:/app/uploads # Shared asset folder
    command: >
      sh -c "/app/bin/marbles_umbrella eval 'Marbles.Release.migrate()' &&
             exec /app/bin/marbles_umbrella start"

  bucket:
    image: chrislusf/seaweedfs
    restart: always
    ports:
      - "9333:9333" # Master
      - "8080:8080" # Filer (HTTP/Browse)
      - "8333:8333" # S3 API
    volumes:
      - bucket_data:/data
    command: "server -dir=/data -s3 -filer"

volumes:
  db_data:
  bucket_data:
